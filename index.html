<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jade Sigil Ascension Gate</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #052e2b 0%, #02201f 45%, #01120f 100%);
      }

      main {
        width: min(94vw, 760px);
        background: rgba(4, 17, 20, 0.94);
        border: 1px solid rgba(110, 231, 183, 0.25);
        border-radius: 18px;
        padding: 1.5rem;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.5);
      }

      h1,
      h2,
      h3 {
        margin: 0;
      }

      p {
        margin: 0;
        color: #cdeee1;
      }

      form,
      .stack {
        display: grid;
        gap: 0.85rem;
      }

      label {
        font-weight: 600;
        font-size: 0.95rem;
      }

      input,
      select {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #2f6053;
        border-radius: 10px;
        padding: 0.7rem;
        background: #031512;
        color: #d9fff1;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 0.7rem;
        font-weight: 700;
        cursor: pointer;
        background: linear-gradient(90deg, #22c55e, #10b981);
        color: #03281d;
      }

      .hidden {
        display: none;
      }

      #message {
        min-height: 1.2rem;
        font-weight: 600;
      }

      #message.error { color: #fecaca; }
      #message.success { color: #86efac; }

      .panel {
        border-radius: 12px;
        border: 1px solid #255247;
        background: #02110f;
        padding: 1rem;
      }

      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
      }

      .badge {
        background: rgba(16, 185, 129, 0.2);
        border: 1px solid rgba(16, 185, 129, 0.4);
        color: #6ee7b7;
        border-radius: 999px;
        padding: 0.2rem 0.6rem;
        font-size: 0.8rem;
      }

      .grid-2 {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      }

      .small { font-size: 0.9rem; color: #a7d7c7; }
      ul { margin: 0.5rem 0 0; padding-left: 1.1rem; }
      li { margin: 0.3rem 0; }
    </style>
  </head>
  <body>
    <main>
      <section id="auth-view" class="stack">
        <h1>Jade Sigil Authorization</h1>
        <p>Enter your passphrase to open the Jade RPG power console.</p>
        <form id="auth-form">
          <div>
            <label for="passphrase">Passphrase</label>
            <input id="passphrase" name="passphrase" type="password" autocomplete="current-password" required />
          </div>
          <button type="submit">Enter the Gate</button>
        </form>
        <p id="message" role="status" aria-live="polite"></p>
      </section>

      <section id="dashboard-view" class="hidden stack">
        <div class="row">
          <h1>Jade RPG: Ascension Engine</h1>
          <span class="badge">Awakened</span>
        </div>

        <div class="panel stack">
          <h2>Build Your Tier</h2>
          <div>
            <label for="level">Current Level</label>
            <select id="level"></select>
          </div>
          <p class="small">Your unlocks and buffs scale from this level.</p>
        </div>

        <div class="grid-2">
          <div class="panel">
            <h3>Unlocked Abilities</h3>
            <ul id="unlocks"></ul>
          </div>
          <div class="panel">
            <h3>Active Buffs</h3>
            <ul id="buffs"></ul>
          </div>
        </div>

        <div class="panel stack">
          <h3>Next Milestone</h3>
          <p id="next-milestone"></p>
          <button id="logout" type="button">Log out</button>
        </div>
      </section>
    </main>

    <script>
      const STORAGE_KEY = "solar-king-authorized";
      const EXPECTED_HASH = "8d1280d2c9217c779220039520786b6eb7b6d18417a171810a06c8ae48412d38";
      const LEVEL_KEY = "jade-rpg-level";

      const progression = [
        { level: 1, unlock: "Jade Sense", buff: "+5% Focus regen" },
        { level: 2, unlock: "Sigil Trace", buff: "+8% Casting speed" },
        { level: 3, unlock: "Verdant Ward", buff: "+10% Shield strength" },
        { level: 4, unlock: "Timeleaf Dash", buff: "+12% Movement burst" },
        { level: 5, unlock: "Emerald Dominion", buff: "+15% All core stats" }
      ];

      const authView = document.querySelector("#auth-view");
      const dashboardView = document.querySelector("#dashboard-view");
      const message = document.querySelector("#message");
      const form = document.querySelector("#auth-form");
      const passphrase = document.querySelector("#passphrase");
      const logout = document.querySelector("#logout");
      const levelSelect = document.querySelector("#level");
      const unlocks = document.querySelector("#unlocks");
      const buffs = document.querySelector("#buffs");
      const nextMilestone = document.querySelector("#next-milestone");

      const setAuthorized = (value) => {
        if (value) {
          sessionStorage.setItem(STORAGE_KEY, "true");
          authView.classList.add("hidden");
          dashboardView.classList.remove("hidden");
        } else {
          sessionStorage.removeItem(STORAGE_KEY);
          dashboardView.classList.add("hidden");
          authView.classList.remove("hidden");
        }
      };

      const hashText = async (value) => {
        const encoded = new TextEncoder().encode(value);
        const digest = await crypto.subtle.digest("SHA-256", encoded);
        return [...new Uint8Array(digest)].map((b) => b.toString(16).padStart(2, "0")).join("");
      };

      const renderProgression = (currentLevel) => {
        unlocks.innerHTML = "";
        buffs.innerHTML = "";

        progression.filter((tier) => tier.level <= currentLevel).forEach((tier) => {
          const unlockItem = document.createElement("li");
          unlockItem.textContent = `Lv ${tier.level}: ${tier.unlock}`;
          unlocks.appendChild(unlockItem);

          const buffItem = document.createElement("li");
          buffItem.textContent = `Lv ${tier.level}: ${tier.buff}`;
          buffs.appendChild(buffItem);
        });

        const next = progression.find((tier) => tier.level > currentLevel);
        nextMilestone.textContent = next
          ? `Level ${next.level} unlocks ${next.unlock} with ${next.buff}.`
          : "Maxed path reached. You are at final Jade Ascension.";
      };

      progression.forEach((tier) => {
        const opt = document.createElement("option");
        opt.value = String(tier.level);
        opt.textContent = `Level ${tier.level}`;
        levelSelect.appendChild(opt);
      });

      const savedLevel = Number(localStorage.getItem(LEVEL_KEY)) || 3;
      levelSelect.value = String(savedLevel);
      renderProgression(savedLevel);

      levelSelect.addEventListener("change", () => {
        const level = Number(levelSelect.value);
        localStorage.setItem(LEVEL_KEY, String(level));
        renderProgression(level);
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        message.textContent = "Validating sigil...";
        message.className = "";

        const candidate = passphrase.value.trim();
        const candidateHash = await hashText(candidate);

        if (candidateHash === EXPECTED_HASH) {
          setAuthorized(true);
          message.textContent = "";
          passphrase.value = "";
        } else {
          message.textContent = "Authorization failed. Please check your passphrase.";
          message.className = "error";
        }
      });

      logout.addEventListener("click", () => {
        setAuthorized(false);
        message.textContent = "Logged out.";
        message.className = "success";
      });

      if (sessionStorage.getItem(STORAGE_KEY) === "true") {
        setAuthorized(true);
      }
    </script>
  </body>
</html>
