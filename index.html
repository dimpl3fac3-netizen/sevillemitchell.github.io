<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solar King Portal</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #1f2937 0%, #0f172a 45%, #020617 100%);
      }

      main {
        width: min(92vw, 520px);
        background: rgba(15, 23, 42, 0.92);
        border: 1px solid rgba(148, 163, 184, 0.3);
        border-radius: 18px;
        padding: 1.5rem;
        box-shadow: 0 16px 40px rgba(2, 6, 23, 0.5);
      }

      h1 {
        margin: 0 0 0.4rem;
        font-size: 1.5rem;
      }

      p {
        margin: 0 0 1rem;
        color: #cbd5e1;
      }

      form {
        display: grid;
        gap: 0.85rem;
      }

      label {
        font-weight: 600;
        font-size: 0.95rem;
      }

      input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #334155;
        border-radius: 10px;
        padding: 0.7rem;
        background: #0f172a;
        color: #e2e8f0;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 0.7rem;
        font-weight: 700;
        cursor: pointer;
        background: linear-gradient(90deg, #f59e0b, #eab308);
        color: #111827;
      }

      .hidden {
        display: none;
      }

      #message {
        min-height: 1.2rem;
        font-weight: 600;
      }

      #message.error {
        color: #fda4af;
      }

      #message.success {
        color: #86efac;
      }

      .panel {
        border-radius: 12px;
        border: 1px solid #334155;
        background: #0b1222;
        padding: 1rem;
      }

      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
      }

      .badge {
        background: rgba(16, 185, 129, 0.18);
        border: 1px solid rgba(16, 185, 129, 0.35);
        color: #6ee7b7;
        border-radius: 999px;
        padding: 0.2rem 0.6rem;
        font-size: 0.8rem;
      }
    </style>
  </head>
  <body>
    <main>
      <section id="auth-view">
        <h1>Solar King Authorization</h1>
        <p>Enter your passphrase to unlock the Solar King dashboard.</p>
        <form id="auth-form">
          <div>
            <label for="passphrase">Passphrase</label>
            <input id="passphrase" name="passphrase" type="password" autocomplete="current-password" required />
          </div>
          <button type="submit">Authorize</button>
        </form>
        <p id="message" role="status" aria-live="polite"></p>
      </section>

      <section id="dashboard-view" class="hidden">
        <div class="row">
          <h1>Solar King Dashboard</h1>
          <span class="badge">Authorized</span>
        </div>
        <div class="panel">
          <p>Authorization completed. This area can now host protected Solar King operations.</p>
          <button id="logout" type="button">Log out</button>
        </div>
      </section>
    </main>

    <script>
      const STORAGE_KEY = "solar-king-authorized";
      const EXPECTED_HASH = "8d1280d2c9217c779220039520786b6eb7b6d18417a171810a06c8ae48412d38";

      const authView = document.querySelector("#auth-view");
      const dashboardView = document.querySelector("#dashboard-view");
      const message = document.querySelector("#message");
      const form = document.querySelector("#auth-form");
      const passphrase = document.querySelector("#passphrase");
      const logout = document.querySelector("#logout");

      const setAuthorized = (value) => {
        if (value) {
          sessionStorage.setItem(STORAGE_KEY, "true");
          authView.classList.add("hidden");
          dashboardView.classList.remove("hidden");
        } else {
          sessionStorage.removeItem(STORAGE_KEY);
          dashboardView.classList.add("hidden");
          authView.classList.remove("hidden");
        }
      };

      const hashText = async (value) => {
        const encoded = new TextEncoder().encode(value);
        const digest = await crypto.subtle.digest("SHA-256", encoded);
        return [...new Uint8Array(digest)].map((b) => b.toString(16).padStart(2, "0")).join("");
      };

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        message.textContent = "Checking authorization...";
        message.className = "";

        const candidate = passphrase.value.trim();
        const candidateHash = await hashText(candidate);

        if (candidateHash === EXPECTED_HASH) {
          setAuthorized(true);
          message.textContent = "";
          passphrase.value = "";
        } else {
          message.textContent = "Authorization failed. Please check your passphrase.";
          message.className = "error";
        }
      });

      logout.addEventListener("click", () => {
        setAuthorized(false);
        message.textContent = "Logged out.";
        message.className = "success";
      });

      if (sessionStorage.getItem(STORAGE_KEY) === "true") {
        setAuthorized(true);
      }
    </script>
  </body>
</html>
